displayName: "GLM-5.2 Blackwell vLLM & SGLang Production Observability (Hamina europe-north1)"
gridLayout:
  columns: 2
  widgets:
  - title: "NVIDIA Blackwell B200 GPU Utilization (%)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="kubernetes.io/container/accelerator/duty_cycle" AND resource.type="k8s_container"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
  - title: "GPU HBM3e Memory Used vs Total (Bytes)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="kubernetes.io/container/accelerator/memory_used" AND resource.type="k8s_container"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "Memory Used"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="kubernetes.io/container/accelerator/memory_total" AND resource.type="k8s_container"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "Total HBM3e Capacity"
  - title: "PCIe Gen5 & NVLink Tensor Interconnect Duty Cycle (%)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="kubernetes.io/container/accelerator/memory_bandwidth_utilization" AND resource.type="k8s_container"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "DRAM Bandwidth Active"
  - title: "GLM-5.2 KV Cache & Token Pool Saturation (%)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:kv_cache_usage_perc/gauge" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM KV Cache Saturation"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:token_usage/gauge" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang Token Pool Saturation"
  - title: "Token Throughput Rate (Tokens/sec)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:generation_tokens_total/counter" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_RATE
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM Output Generation Rate (t/s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:prompt_tokens_total/counter" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_RATE
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM Prompt Prefill Rate (t/s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:generation_tokens_total/counter" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_RATE
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang Output Generation Rate (t/s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:prompt_tokens_total/counter" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_RATE
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang Prompt Prefill Rate (t/s)"
  - title: "Time-to-First-Token (TTFT Latency Distribution)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:time_to_first_token_seconds/histogram" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_PERCENTILE_99
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM TTFT P99 (s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:time_to_first_token_seconds/histogram" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_PERCENTILE_50
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM TTFT P50 (s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:time_to_first_token_seconds/histogram" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_PERCENTILE_99
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang TTFT P99 (s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:time_to_first_token_seconds/histogram" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_PERCENTILE_50
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang TTFT P50 (s)"
  - title: "Time-Per-Output-Token (TPOT Inter-Token Latency)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:request_time_per_output_token_seconds/histogram" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_PERCENTILE_99
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM TPOT P99 (s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:request_time_per_output_token_seconds/histogram" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_PERCENTILE_50
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM TPOT P50 (s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:time_per_output_token_seconds/histogram" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_PERCENTILE_99
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang TPOT P99 (s)"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:time_per_output_token_seconds/histogram" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_PERCENTILE_50
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang TPOT P50 (s)"
  - title: "Active Concurrency & Queue Length"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:num_requests_running/gauge" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM Running Requests"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/vllm:num_requests_waiting/gauge" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "vLLM Waiting in Queue"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:num_running_reqs/gauge" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang Running Requests"
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:num_queue_reqs/gauge" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang Waiting in Queue"
  - title: "SGLang RadixAttention Cache Hit Rate (%)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:cache_hit_rate/gauge" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "Prefix Cache Hit Rate"
  - title: "SGLang Generation Throughput Gauge (Tokens/sec)"
    xyChart:
      dataSets:
      - timeSeriesQuery:
          timeSeriesFilter:
            filter: 'metric.type="prometheus.googleapis.com/sglang:gen_throughput/gauge" AND resource.type="prometheus_target"'
            aggregation:
              perSeriesAligner: ALIGN_MEAN
              alignmentPeriod: 60s
        plotType: LINE
        legendTemplate: "SGLang Gen Throughput Gauge"
